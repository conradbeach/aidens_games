<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Stick vs Lizards</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #1a1a2e; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; font-family: 'Courier New', monospace; }
canvas { display: block; border: 2px solid #444; image-rendering: pixelated; }
</style>
</head>
<body>
<canvas id="c" width="800" height="420"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;
const GROUND = H - 60;
const PIPE_W = 52, PIPE_H = 64;
const SLEEVE_COL = '#c0392b';

// ── Bonus Room Layout ─────────────────────────────────────────────────────────
const ROOM_X = 70, ROOM_Y = 55, ROOM_W = 660, ROOM_H = 310;
const ROOM_FLOOR_Y = ROOM_Y + ROOM_H - 18;
const BONUS_PLATFORMS = [
  { x: 130, y: 272, w: 110, h: 14 },
  { x: 310, y: 208, w: 105, h: 14 },
  { x: 500, y: 278, w: 115, h: 14 },
  { x: 248, y: 140, w: 88, h: 14 },
  { x: 462, y: 162, w: 95, h: 14 },
];

// ── Game State ────────────────────────────────────────────────────────────────
const STATE = { TITLE: 0, PLAYING: 1, DEAD: 2, GAMEOVER: 3, BONUS: 4, CLOUD: 5 };
let state = STATE.TITLE;
let score = 0, level = 1, lives = 3, coinsCollected = 0;
const SWORD_COLORS = [
  { name: 'Blue',   blade: '#1e90ff', guard: '#aaddff' },
  { name: 'Red',    blade: '#ff3322', guard: '#ffaaaa' },
  { name: 'Green',  blade: '#22cc44', guard: '#aaffbb' },
  { name: 'Purple', blade: '#aa44ff', guard: '#ddaaff' },
  { name: 'Gold',   blade: '#ffcc00', guard: '#ffe877' },
  { name: 'Silver', blade: '#ccddff', guard: '#eeeeff' },
  { name: 'Orange', blade: '#ff8800', guard: '#ffcc88' },
];
let swordColorIdx = 0;
let highScore = parseInt(localStorage.getItem('stickLizardsHighScore') || '0');
let deadTimer = 0, victory = false;
let scrollX = 0;

// Hidden trap tiles — look like normal ground, fall through to bonus room
// (worldX is the left edge of the 60px-wide hidden hole)
const pipes = [
  { worldX: 6000,  w: 60 },
  { worldX: 13000, w: 60 },
];

// Vine + Cloud Room state
let vine = null;
const vineUsedLevels = new Set();
let cloudEntryFlash = 0;
const CLOUD_ROOM_X = 80, CLOUD_ROOM_Y = 10, CLOUD_ROOM_W = 640, CLOUD_ROOM_H = 280;
const CLOUD_ROOM_FLOOR_Y = CLOUD_ROOM_Y + CLOUD_ROOM_H - 30;
let cloudTimer = 0, cloudWatermelons = [], cloudParticles = [];
let savedCloudX = 0, savedCloudY = 0;

// Bonus state
let bonusTimer = 0, bonusCoins = [], bonusParticles = [];
let savedHeroX = 0, savedHeroY = 0;
let downJustPressed = false;
let bonusEntryFlash = 0; // frames to show "FELL IN!" message
let bonusCurrentPipe = null;

// ── Ninja Monkey state ────────────────────────────────────────────────────────
let ninjaMonkey = null;
let ninjaMonkeyUsedLevel = -1;
let ninjaMonkeySpawnTimer = 300;
let ninjaStars = [];

// ── Input ─────────────────────────────────────────────────────────────────────
const keys = {};
document.addEventListener('keydown', e => {
  if (!keys[e.code] && e.code === 'ArrowDown') downJustPressed = true;
  keys[e.code] = true;
  if (state === STATE.TITLE) {
    if (e.code === 'ArrowLeft')  { swordColorIdx = (swordColorIdx - 1 + SWORD_COLORS.length) % SWORD_COLORS.length; }
    else if (e.code === 'ArrowRight') { swordColorIdx = (swordColorIdx + 1) % SWORD_COLORS.length; }
    else startGame();
  }
  if (state === STATE.GAMEOVER && e.code === 'KeyR') resetGame();
});
document.addEventListener('keyup', e => { keys[e.code] = false; });
window.addEventListener('blur', () => { Object.keys(keys).forEach(k => keys[k] = false); });

// ── Particles ─────────────────────────────────────────────────────────────────
let particles = [];
function spawnParticles(x, y, colors, count, spread, arr) {
  const target = arr || particles;
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 1.5 + Math.random() * spread;
    target.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - 1.2,
      life: 1,
      color: colors[Math.floor(Math.random() * colors.length)],
      size: 2 + Math.random() * 3
    });
  }
}

function updateParticleArr(arr) {
  const decay = 1 / 45;
  arr.forEach(p => { p.x += p.vx; p.y += p.vy; p.vy += 0.08; p.life -= decay; });
  return arr.filter(p => p.life > 0);
}

function drawParticleArr(arr) {
  arr.forEach(p => {
    ctx.save();
    ctx.globalAlpha = Math.max(0, p.life);
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * p.life + 0.5, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  });
}

// ── Parallax Background ───────────────────────────────────────────────────────
const mountains = Array.from({ length: 8 }, (_, i) => ({
  x: i * 220, w: 120 + Math.random() * 100, h: 80 + Math.random() * 80
}));
const clouds = Array.from({ length: 7 }, (_, i) => ({
  x: i * 160 + Math.random() * 80, y: 40 + Math.random() * 60,
  w: 60 + Math.random() * 60, h: 25 + Math.random() * 20
}));

function drawBackground() {
  const sky = ctx.createLinearGradient(0, 0, 0, GROUND);
  sky.addColorStop(0, '#87CEEB');
  sky.addColorStop(1, '#d4f1ff');
  ctx.fillStyle = sky;
  ctx.fillRect(0, 0, W, GROUND);

  const mOff = scrollX * 0.2;
  mountains.forEach(m => {
    let mx = ((m.x - mOff) % (8 * 220) + 8 * 220) % (8 * 220);
    ctx.fillStyle = '#8899aa';
    ctx.beginPath();
    ctx.moveTo(mx, GROUND); ctx.lineTo(mx + m.w / 2, GROUND - m.h); ctx.lineTo(mx + m.w, GROUND);
    ctx.closePath(); ctx.fill();
    ctx.fillStyle = '#ddeeff';
    ctx.beginPath();
    ctx.moveTo(mx + m.w / 2, GROUND - m.h);
    ctx.lineTo(mx + m.w / 2 - 12, GROUND - m.h + 22);
    ctx.lineTo(mx + m.w / 2 + 12, GROUND - m.h + 22);
    ctx.closePath(); ctx.fill();
  });

  const cOff = scrollX * 0.5;
  ctx.fillStyle = 'rgba(255,255,255,0.9)';
  clouds.forEach(c => {
    let cx = ((c.x - cOff) % (7 * 160 + 600) + 7 * 160 + 600) % (7 * 160 + 600);
    ctx.beginPath();
    ctx.ellipse(cx + c.w * 0.5, c.y + c.h * 0.6, c.w * 0.5, c.h * 0.4, 0, 0, Math.PI * 2);
    ctx.ellipse(cx + c.w * 0.3, c.y + c.h * 0.4, c.w * 0.28, c.h * 0.45, 0, 0, Math.PI * 2);
    ctx.ellipse(cx + c.w * 0.7, c.y + c.h * 0.4, c.w * 0.25, c.h * 0.4, 0, 0, Math.PI * 2);
    ctx.fill();
  });

  ctx.fillStyle = '#5a8a3c';
  ctx.fillRect(0, GROUND, W, 14);
  ctx.fillStyle = '#7a5c3c';
  ctx.fillRect(0, GROUND + 14, W, H - GROUND - 14);

  const tileW = 40, tOff = scrollX % tileW;
  ctx.strokeStyle = 'rgba(0,0,0,0.12)';
  ctx.lineWidth = 1;
  for (let tx = -tOff; tx < W; tx += tileW) {
    ctx.beginPath(); ctx.moveTo(tx, GROUND + 14); ctx.lineTo(tx, H); ctx.stroke();
  }
}

// ── Platforms ─────────────────────────────────────────────────────────────────
let platforms = [], platformSpawnTimer = 0;

function spawnPlatform() {
  platforms.push({ x: W + 60, y: GROUND - 70 - Math.random() * 110, w: 90 + Math.random() * 70, h: 18 });
}

function updatePlatforms(ws) {
  if (++platformSpawnTimer >= 120) { platformSpawnTimer = 0; spawnPlatform(); }
  platforms.forEach(p => p.x -= ws);
  platforms = platforms.filter(p => p.x + p.w > -50);
}

function drawPlatforms() {
  platforms.forEach(p => {
    ctx.fillStyle = '#8B5E3C';
    ctx.beginPath(); ctx.roundRect(p.x, p.y + 6, p.w, p.h - 6, 4); ctx.fill();
    ctx.fillStyle = '#5a8a3c';
    ctx.beginPath(); ctx.roundRect(p.x, p.y, p.w, 10, [5, 5, 0, 0]); ctx.fill();
    ctx.fillStyle = '#6db84a';
    for (let gx = p.x + 6; gx < p.x + p.w - 6; gx += 12) ctx.fillRect(gx, p.y + 1, 3, 5);
  });
}

// ── Pipes / Traps ─────────────────────────────────────────────────────────────
// Traps are invisible on the surface — ground is drawn over them normally.
// This helper draws the entry pipe stub used inside the bonus room ceiling.
function drawCeilingPipe(cx) {
  const px = cx - PIPE_W / 2, rimW = PIPE_W + 12, rimX = px - 6;
  const top = ROOM_Y + 18; // flush with bottom of cave ceiling strip
  ctx.fillStyle = '#145214'; ctx.fillRect(px, top, PIPE_W, 22);
  ctx.fillStyle = '#2E7D32'; ctx.fillRect(px + 3, top, PIPE_W - 6, 22);
  ctx.fillStyle = '#43A047'; ctx.fillRect(px + 4, top, 8, 22);
  ctx.fillStyle = '#145214'; ctx.fillRect(rimX, top, rimW, 16);
  ctx.fillStyle = '#388E3C'; ctx.fillRect(rimX + 3, top, rimW - 6, 16);
  ctx.fillStyle = '#66BB6A'; ctx.fillRect(rimX + 4, top + 2, 10, 6);
  ctx.fillStyle = '#0a1a0a'; ctx.fillRect(px + 5, top + 3, PIPE_W - 10, 11);
}
// (no drawPipes needed in the overworld — traps look like normal ground)

// ── Vine ──────────────────────────────────────────────────────────────────────
function drawVine() {
  if (!vine) return;
  const vx = vine.worldX - scrollX;
  if (vx + vine.w < -20 || vx > W + 20) return;
  const topY = GROUND - vine.h;
  ctx.lineCap = 'round';
  ctx.strokeStyle = '#5a3a00'; ctx.lineWidth = vine.w;
  ctx.beginPath(); ctx.moveTo(vx + vine.w/2, GROUND); ctx.lineTo(vx + vine.w/2, topY); ctx.stroke();
  ctx.strokeStyle = '#8a6030'; ctx.lineWidth = vine.w - 5;
  ctx.beginPath(); ctx.moveTo(vx + vine.w/2, GROUND); ctx.lineTo(vx + vine.w/2, topY); ctx.stroke();
  ctx.fillStyle = '#3a8a20';
  for (let ly = topY + 25; ly < GROUND - 10; ly += 35) {
    ctx.beginPath(); ctx.ellipse(vx + vine.w/2 - 13, ly, 11, 5, -0.4, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(vx + vine.w/2 + 13, ly + 17, 11, 5, 0.4, 0, Math.PI*2); ctx.fill();
  }
  ctx.save(); ctx.textAlign = 'center'; ctx.font = 'bold 14px Courier New';
  ctx.fillStyle = '#aaffaa'; ctx.fillText('↑', vx + vine.w/2, topY - 6); ctx.restore();
}

// ── Watermelon ────────────────────────────────────────────────────────────────
function drawWatermelon(x, y, r, rot) {
  ctx.save(); ctx.translate(x, y); ctx.rotate(rot);
  ctx.beginPath(); ctx.ellipse(0, 0, r, r * 0.72, 0, 0, Math.PI * 2);
  ctx.fillStyle = '#2a8a2a'; ctx.fill();
  ctx.strokeStyle = '#1a5a1a'; ctx.lineWidth = 1.5;
  [-r*0.35, 0, r*0.35].forEach(sx => {
    ctx.beginPath(); ctx.moveTo(sx, -r*0.72); ctx.lineTo(sx, r*0.72); ctx.stroke();
  });
  ctx.beginPath(); ctx.ellipse(0, 0, r * 0.72, r * 0.52, 0, 0, Math.PI * 2);
  ctx.fillStyle = '#e03838'; ctx.fill();
  ctx.fillStyle = '#111';
  [[-5,-1],[0,-5],[5,-1],[3,5],[-3,5]].forEach(([sx,sy]) => {
    ctx.beginPath(); ctx.ellipse(sx, sy, 2, 3.2, 0.2, 0, Math.PI*2); ctx.fill();
  });
  ctx.restore();
}

// ── Cloud Room ────────────────────────────────────────────────────────────────
function initCloudWatermelons() {
  cloudWatermelons = [
    { x: CLOUD_ROOM_X + CLOUD_ROOM_W - 40, y: CLOUD_ROOM_FLOOR_Y - 26, rot: 0 },
  ];
}

function enterCloudRoom() {
  savedCloudX = hero.x; savedCloudY = hero.y;
  hero.x = CLOUD_ROOM_X + 20;
  hero.y = CLOUD_ROOM_Y + 28;
  hero.vx = 0; hero.vy = 3; hero.onGround = false; hero.walkFrame = 0;
  cloudTimer = 15 * 60;
  cloudEntryFlash = 90;
  initCloudWatermelons();
  cloudParticles = [];
  if (vine) vineUsedLevels.add(vine.forLevel);
  vine = null;
  state = STATE.CLOUD;
}

function exitCloudRoom() {
  hero.x = savedCloudX; hero.y = savedCloudY - 10;
  hero.vx = 0; hero.vy = -8;
  hero.onGround = false;
  hero.invincible = 90; hero.flickerToggle = 0;
  state = STATE.PLAYING;
}

function updateCloudRoom() {
  // Hero movement (bounded to cloud room)
  const speed = 3.2;
  hero.vx = 0;
  if (keys['ArrowLeft'])  { hero.vx = -speed; hero.facingRight = false; }
  if (keys['ArrowRight']) { hero.vx =  speed; hero.facingRight = true; }
  if ((keys['ArrowUp'] || keys['Space']) && hero.onGround) { hero.vy = -13; hero.onGround = false; }
  hero.vy += 0.55;
  hero.y += hero.vy;
  hero.x += hero.vx;
  hero.x = Math.max(CLOUD_ROOM_X + 4, Math.min(CLOUD_ROOM_X + CLOUD_ROOM_W - hero.w - 4, hero.x));
  hero.onGround = false;
  if (hero.y < CLOUD_ROOM_Y + 36) { hero.y = CLOUD_ROOM_Y + 36; hero.vy = Math.abs(hero.vy) * 0.4; }
  if (hero.y + hero.h >= CLOUD_ROOM_FLOOR_Y) { hero.y = CLOUD_ROOM_FLOOR_Y - hero.h; hero.vy = 0; hero.onGround = true; }
  if (hero.vx !== 0 && hero.onGround) hero.walkFrame += 0.18;

  // Watermelon collection
  cloudWatermelons = cloudWatermelons.filter(m => {
    const r = 18;
    if (rectsOverlap(hero.x+2, hero.y+2, hero.w-4, hero.h-4, m.x-r, m.y-r, r*2, r*2)) {
      if (lives < 3) {
        lives++;
        spawnParticles(m.x, m.y, ['#2a8a2a','#e03838','#fff','#ffcc00'], 12, 3, cloudParticles);
      }
      return false;
    }
    return true;
  });

  cloudParticles = updateParticleArr(cloudParticles);
  cloudTimer--;
  if (cloudTimer <= 0) exitCloudRoom();
}

function drawCloudRoom() {
  // Dimmed world behind
  drawBackground();
  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  ctx.fillRect(0, 0, W, H);

  // Sky background
  const sky = ctx.createLinearGradient(CLOUD_ROOM_X, CLOUD_ROOM_Y, CLOUD_ROOM_X, CLOUD_ROOM_Y + CLOUD_ROOM_H);
  sky.addColorStop(0, '#a8d8f0');
  sky.addColorStop(1, '#e8f8ff');
  ctx.fillStyle = sky;
  ctx.fillRect(CLOUD_ROOM_X, CLOUD_ROOM_Y, CLOUD_ROOM_W, CLOUD_ROOM_H);

  // Room border
  ctx.strokeStyle = '#88bbdd'; ctx.lineWidth = 4;
  ctx.strokeRect(CLOUD_ROOM_X, CLOUD_ROOM_Y, CLOUD_ROOM_W, CLOUD_ROOM_H);
  ctx.strokeStyle = '#ffffff'; ctx.lineWidth = 1.5;
  ctx.strokeRect(CLOUD_ROOM_X+3, CLOUD_ROOM_Y+3, CLOUD_ROOM_W-6, CLOUD_ROOM_H-6);

  // Cloud floor
  ctx.fillStyle = '#fff';
  [[CLOUD_ROOM_X+60, CLOUD_ROOM_FLOOR_Y+4, 90, 28],
   [CLOUD_ROOM_X+200, CLOUD_ROOM_FLOOR_Y+6, 110, 26],
   [CLOUD_ROOM_X+360, CLOUD_ROOM_FLOOR_Y+4, 130, 30],
   [CLOUD_ROOM_X+530, CLOUD_ROOM_FLOOR_Y+6, 100, 26]].forEach(([cx,cy,cw,ch]) => {
    ctx.beginPath();
    ctx.ellipse(cx, cy, cw*0.5, ch*0.45, 0, 0, Math.PI*2);
    ctx.ellipse(cx-cw*0.25, cy+ch*0.1, cw*0.3, ch*0.4, 0, 0, Math.PI*2);
    ctx.ellipse(cx+cw*0.25, cy+ch*0.1, cw*0.28, ch*0.38, 0, 0, Math.PI*2);
    ctx.fill();
  });
  // Solid floor strip
  ctx.fillStyle = 'rgba(255,255,255,0.7)';
  ctx.fillRect(CLOUD_ROOM_X, CLOUD_ROOM_FLOOR_Y, CLOUD_ROOM_W, CLOUD_ROOM_H - (CLOUD_ROOM_FLOOR_Y - CLOUD_ROOM_Y));

  // Decorative clouds in sky
  ctx.fillStyle = 'rgba(255,255,255,0.6)';
  [[CLOUD_ROOM_X+80, CLOUD_ROOM_Y+60, 60, 22],
   [CLOUD_ROOM_X+310, CLOUD_ROOM_Y+40, 80, 26],
   [CLOUD_ROOM_X+540, CLOUD_ROOM_Y+65, 70, 22]].forEach(([cx,cy,cw,ch]) => {
    ctx.beginPath();
    ctx.ellipse(cx, cy, cw*0.5, ch*0.5, 0, 0, Math.PI*2);
    ctx.ellipse(cx-cw*0.28, cy+4, cw*0.3, ch*0.4, 0, 0, Math.PI*2);
    ctx.ellipse(cx+cw*0.28, cy+4, cw*0.28, ch*0.38, 0, 0, Math.PI*2);
    ctx.fill();
  });

  // Watermelons
  cloudWatermelons.forEach(m => drawWatermelon(m.x, m.y, 18, m.rot));

  // Particles
  drawParticleArr(cloudParticles);

  // Hero
  drawHero();

  // Timer bar
  const timerPct = cloudTimer / (15*60);
  const barW = CLOUD_ROOM_W - 20;
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.fillRect(CLOUD_ROOM_X+10, CLOUD_ROOM_Y-22, barW, 14);
  const barColor = timerPct > 0.4 ? '#4CAF50' : timerPct > 0.2 ? '#FFD700' : '#ff4444';
  ctx.fillStyle = barColor;
  ctx.fillRect(CLOUD_ROOM_X+10, CLOUD_ROOM_Y-22, barW*timerPct, 14);
  ctx.strokeStyle = '#fff'; ctx.lineWidth = 1;
  ctx.strokeRect(CLOUD_ROOM_X+10, CLOUD_ROOM_Y-22, barW, 14);

  ctx.save();
  ctx.textAlign = 'center';
  ctx.font = 'bold 13px Courier New'; ctx.fillStyle = '#fff';
  const secs = Math.ceil(cloudTimer/60);
  ctx.fillText('CLOUD ROOM  ' + secs + 's  —  \uD83C\uDF49 ' + cloudWatermelons.length + ' left', W/2, CLOUD_ROOM_Y-10);

  // Entry flash
  if (cloudEntryFlash > 0) {
    const alpha = Math.min(1, cloudEntryFlash / 30);
    ctx.globalAlpha = alpha;
    ctx.font = 'bold 36px Courier New'; ctx.fillStyle = '#2ecc40';
    ctx.shadowColor = '#00aa22'; ctx.shadowBlur = 14;
    ctx.fillText('CLOUD ROOM!', W/2, CLOUD_ROOM_Y + CLOUD_ROOM_H/2 - 20);
    ctx.shadowBlur = 0;
    ctx.globalAlpha = 1;
    cloudEntryFlash--;
  }
  ctx.restore();

  drawHUD();
}

// ── Hero ──────────────────────────────────────────────────────────────────────
const hero = {
  x: 150, y: GROUND - 52,
  vx: 0, vy: 0,
  onGround: false,
  walkFrame: 0,
  invincible: 0, flickerToggle: 0,
  facingRight: true,
  onVine: false,
  w: 20, h: 50
};

function updateHero() {
  const speed = 3.2;
  hero.vx = 0;
  if (keys['ArrowLeft'])  { hero.vx = -speed; hero.facingRight = false; }
  if (keys['ArrowRight']) { hero.vx =  speed; hero.facingRight = true; }

  // Vine grab — takes priority over jump
  if (vine && hero.onGround && keys['ArrowUp']) {
    const vx = vine.worldX - scrollX;
    if (hero.x + hero.w - 2 > vx && hero.x + 2 < vx + vine.w) {
      enterCloudRoom(); return;
    }
  }

  if ((keys['ArrowUp'] || keys['Space']) && hero.onGround) {
    hero.vy = -13; hero.onGround = false;
  }

  hero.vy += 0.55;
  hero.y += hero.vy;
  hero.x += hero.vx;
  hero.x = Math.max(30, Math.min(W - 60, hero.x));
  hero.onGround = false;

  // Trap fall-through: skip ground landing if hero walks onto a hidden trap tile
  if (hero.vy > 0 && hero.y + hero.h >= GROUND) {
    let trap = null;
    pipes.forEach(p => {
      const px = p.worldX - scrollX;
      if (hero.x + hero.w - 4 > px && hero.x + 4 < px + p.w) trap = p;
    });
    if (trap && state === STATE.PLAYING) {
      // Burst of dirt/grass particles, then warp underground
      spawnParticles(hero.x + hero.w/2, GROUND - 4,
        ['#5a8a3c','#7a5c3c','#8B5E3C','#6db84a'], 16, 3.5);
      enterBonus(trap);
      return;
    }
    // Normal ground landing
    hero.y = GROUND - hero.h;
    hero.vy = 0;
    hero.onGround = true;
  }

  // Platform collision (one-way landing)
  platforms.forEach(p => {
    if (hero.vy >= 0 &&
        hero.y + hero.h > p.y && hero.y + hero.h < p.y + p.h + 10 &&
        hero.x + hero.w - 4 > p.x && hero.x + 4 < p.x + p.w) {
      hero.y = p.y - hero.h; hero.vy = 0; hero.onGround = true;
    }
  });

  if (hero.vx !== 0 && hero.onGround) hero.walkFrame += 0.18;
  if (hero.invincible > 0) { hero.invincible--; hero.flickerToggle++; }
}

function updateBonusHero() {
  const speed = 3.2;
  hero.vx = 0;
  if (keys['ArrowLeft'])  { hero.vx = -speed; hero.facingRight = false; }
  if (keys['ArrowRight']) { hero.vx =  speed; hero.facingRight = true; }
  if ((keys['ArrowUp'] || keys['Space']) && hero.onGround) {
    hero.vy = -13; hero.onGround = false;
  }

  hero.vy += 0.55;
  hero.y += hero.vy;
  hero.x += hero.vx;
  hero.x = Math.max(ROOM_X + 4, Math.min(ROOM_X + ROOM_W - hero.w - 4, hero.x));
  hero.onGround = false;

  // Ceiling
  if (hero.y < ROOM_Y + 40) { hero.y = ROOM_Y + 40; hero.vy = Math.abs(hero.vy) * 0.4; }
  // Floor
  if (hero.y + hero.h >= ROOM_FLOOR_Y) {
    hero.y = ROOM_FLOOR_Y - hero.h; hero.vy = 0; hero.onGround = true;
  }
  // Platforms
  BONUS_PLATFORMS.forEach(p => {
    if (hero.vy >= 0 &&
        hero.y + hero.h > p.y && hero.y + hero.h < p.y + p.h + 10 &&
        hero.x + hero.w - 4 > p.x && hero.x + 4 < p.x + p.w) {
      hero.y = p.y - hero.h; hero.vy = 0; hero.onGround = true;
    }
  });

  if (hero.vx !== 0 && hero.onGround) hero.walkFrame += 0.18;
}

function drawHero() {
  if (hero.invincible > 0 && Math.floor(hero.flickerToggle / 4) % 2 === 0) return;

  const cx = hero.x + hero.w / 2;
  const headY   = hero.y + 10;
  const shoulderY = hero.y + 22;
  const hipY    = hero.y + 36;
  const footY   = hero.y + hero.h;

  const legSwing = Math.sin(hero.walkFrame) * (hero.onGround ? 0.5 : 0.15);
  const armSwing = -legSwing;

  ctx.save();
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';

  // ── Legs ──
  const legLen = 16;
  ctx.lineWidth = 2.5;
  ctx.strokeStyle = '#3355aa';
  ctx.beginPath(); ctx.moveTo(cx - 4, hipY);
  ctx.lineTo(cx - 4 + Math.sin(legSwing) * legLen, footY); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx + 4, hipY);
  ctx.lineTo(cx + 4 - Math.sin(legSwing) * legLen, footY); ctx.stroke();

  // ── Torso ──
  ctx.beginPath(); ctx.moveTo(cx, headY + 10); ctx.lineTo(cx, hipY);
  ctx.strokeStyle = '#333'; ctx.lineWidth = 2.5; ctx.stroke();

  // ── Left arm with sleeve ──
  const armLen = 14;
  const lDX = -Math.cos(armSwing + 0.5) * armLen;
  const lDY =  Math.sin(armSwing + 0.5) * armLen + 8;
  const lMidX = cx + lDX * 0.55, lMidY = shoulderY + lDY * 0.55;
  const lEndX = cx + lDX,         lEndY = shoulderY + lDY;
  // Sleeve (upper)
  ctx.beginPath(); ctx.moveTo(cx, shoulderY); ctx.lineTo(lMidX, lMidY);
  ctx.strokeStyle = SLEEVE_COL; ctx.lineWidth = 3.2; ctx.stroke();
  // Forearm (skin)
  ctx.beginPath(); ctx.moveTo(lMidX, lMidY); ctx.lineTo(lEndX, lEndY);
  ctx.strokeStyle = '#f5d5b0'; ctx.lineWidth = 2.5; ctx.stroke();

  // ── Right arm with sleeve (holds sword) ──
  const rDX = Math.cos(-armSwing + 0.3) * armLen;
  const rDY = Math.sin(-armSwing + 0.3) * armLen + 8;
  const rMidX = cx + rDX * 0.55, rMidY = shoulderY + rDY * 0.55;
  const rArmEndX = cx + rDX,      rArmEndY = shoulderY + rDY;
  // Sleeve (upper)
  ctx.beginPath(); ctx.moveTo(cx, shoulderY); ctx.lineTo(rMidX, rMidY);
  ctx.strokeStyle = SLEEVE_COL; ctx.lineWidth = 3.2; ctx.stroke();
  // Forearm (skin)
  ctx.beginPath(); ctx.moveTo(rMidX, rMidY); ctx.lineTo(rArmEndX, rArmEndY);
  ctx.strokeStyle = '#f5d5b0'; ctx.lineWidth = 2.5; ctx.stroke();

  // ── Sword ──
  const sc = SWORD_COLORS[swordColorIdx];
  const swordAngle = -armSwing * 0.4 + 0.4;
  ctx.beginPath();
  ctx.moveTo(rArmEndX, rArmEndY);
  ctx.lineTo(rArmEndX + Math.cos(swordAngle) * 22, rArmEndY - Math.sin(swordAngle) * 22);
  ctx.strokeStyle = sc.blade; ctx.lineWidth = 3; ctx.stroke();
  // Guard
  ctx.beginPath();
  ctx.moveTo(rArmEndX + Math.cos(swordAngle)*8 - Math.sin(swordAngle)*6,
             rArmEndY - Math.sin(swordAngle)*8 - Math.cos(swordAngle)*6);
  ctx.lineTo(rArmEndX + Math.cos(swordAngle)*8 + Math.sin(swordAngle)*6,
             rArmEndY - Math.sin(swordAngle)*8 + Math.cos(swordAngle)*6);
  ctx.strokeStyle = sc.guard; ctx.lineWidth = 2; ctx.stroke();

  // ── Head ──
  ctx.beginPath(); ctx.arc(cx, headY, 10, 0, Math.PI * 2);
  ctx.fillStyle = '#f5d5b0'; ctx.fill();
  ctx.strokeStyle = '#333'; ctx.lineWidth = 1.5; ctx.stroke();
  // Smile
  ctx.beginPath(); ctx.arc(cx, headY + 2, 5, 0.3, Math.PI - 0.3);
  ctx.strokeStyle = '#333'; ctx.lineWidth = 1.5; ctx.stroke();
  // Eyes
  ctx.fillStyle = '#333';
  ctx.beginPath(); ctx.arc(cx - 3, headY - 2, 1.2, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(cx + 3, headY - 2, 1.2, 0, Math.PI * 2); ctx.fill();

  ctx.restore();
}

// ── Lizards ───────────────────────────────────────────────────────────────────
const LIZARD_COLORS = [
  { body: '#4CAF50', belly: '#a5d6a7', spike: '#388E3C', dark: '#2E7D32' },
  { body: '#ef5350', belly: '#ffcdd2', spike: '#c62828', dark: '#b71c1c' },
  { body: '#42a5f5', belly: '#bbdefb', spike: '#1565C0', dark: '#0d47a1' },
];
let lizards = [], lizardSpawnTimer = 0;

function spawnLizard() {
  const colorIdx = Math.floor(Math.random() * 3);
  const onPlat = platforms.length > 0 && Math.random() < 0.3;
  let lx, ly;
  if (onPlat) {
    const plat = platforms[Math.floor(Math.random() * platforms.length)];
    if (plat.x > W - 100) { lx = plat.x + Math.random() * plat.w * 0.6; ly = plat.y - 28; }
    else { lx = W + 40; ly = GROUND - 28; }
  } else { lx = W + 40; ly = GROUND - 28; }
  lizards.push({ x: lx, y: ly, vy: 0, onGround: ly >= GROUND - 30, colorIdx, walkFrame: Math.random() * Math.PI * 2, tongueOut: false, tongueTimer: 0, w: 40, h: 28 });
}

function updateLizards(ws) {
  const si = Math.max(55, 190 - level * 12);
  if (++lizardSpawnTimer >= si) { lizardSpawnTimer = 0; spawnLizard(); }
  const lspeed = 1.4 + level * 0.28;
  lizards.forEach(lz => {
    lz.x -= (ws + lspeed);
    lz.walkFrame += 0.14;
    lz.vy += 0.55; lz.y += lz.vy;
    if (lz.y >= GROUND - 28) { lz.y = GROUND - 28; lz.vy = 0; lz.onGround = true; }
    platforms.forEach(p => {
      if (lz.vy >= 0 && lz.y+28 > p.y && lz.y+28 < p.y+p.h+8 && lz.x+lz.w > p.x && lz.x < p.x+p.w) {
        lz.y = p.y - 28; lz.vy = 0; lz.onGround = true;
      }
    });
    if (++lz.tongueTimer > 40) { lz.tongueOut = !lz.tongueOut; lz.tongueTimer = 0; }
  });
  lizards = lizards.filter(lz => lz.x + lz.w > -60);
}

function drawLizard(lz) {
  const col = LIZARD_COLORS[lz.colorIdx];
  const cx = lz.x + lz.w / 2, cy = lz.y + lz.h / 2;
  ctx.save();
  // Flip to face left (direction of movement)
  ctx.translate(cx, cy);
  ctx.scale(-1, 1);
  ctx.translate(-cx, -cy);
  ctx.lineCap = 'round';
  // Tail
  ctx.beginPath(); ctx.moveTo(lz.x+4, cy+4);
  ctx.bezierCurveTo(lz.x-18, cy+2, lz.x-28, cy+18, lz.x-24, cy+6);
  ctx.strokeStyle = col.body; ctx.lineWidth = 7; ctx.stroke();
  ctx.beginPath(); ctx.moveTo(lz.x+4, cy+4);
  ctx.bezierCurveTo(lz.x-18, cy+2, lz.x-28, cy+18, lz.x-24, cy+6);
  ctx.strokeStyle = col.dark; ctx.lineWidth = 3; ctx.stroke();
  // Body
  ctx.beginPath(); ctx.ellipse(cx, cy, 20, 13, 0, 0, Math.PI*2);
  ctx.fillStyle = col.body; ctx.fill(); ctx.strokeStyle = col.dark; ctx.lineWidth = 1.5; ctx.stroke();
  // Belly
  ctx.beginPath(); ctx.ellipse(cx+2, cy+3, 12, 7, 0, 0, Math.PI*2);
  ctx.fillStyle = col.belly; ctx.fill();
  // Spikes
  ctx.fillStyle = col.spike;
  for (let i = 0; i < 4; i++) {
    const sx = lz.x+8+i*8, sy = cy-13;
    ctx.beginPath(); ctx.moveTo(sx,sy); ctx.lineTo(sx-3.5,sy+7); ctx.lineTo(sx+3.5,sy+7); ctx.closePath(); ctx.fill();
  }
  // Head
  ctx.beginPath(); ctx.ellipse(lz.x+lz.w+2, cy-2, 12, 9, 0.1, 0, Math.PI*2);
  ctx.fillStyle = col.body; ctx.fill(); ctx.strokeStyle = col.dark; ctx.lineWidth = 1.5; ctx.stroke();
  // Eye
  ctx.beginPath(); ctx.arc(lz.x+lz.w+7, cy-5, 2.5, 0, Math.PI*2); ctx.fillStyle='#fff'; ctx.fill();
  ctx.beginPath(); ctx.arc(lz.x+lz.w+8, cy-5, 1.2, 0, Math.PI*2); ctx.fillStyle='#111'; ctx.fill();
  // Tongue
  if (lz.tongueOut) {
    const tx = lz.x+lz.w+14, ty = cy;
    ctx.strokeStyle = '#ff4488'; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(tx,ty); ctx.lineTo(tx+10,ty+2); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(tx+10,ty+2); ctx.lineTo(tx+14,ty-2); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(tx+10,ty+2); ctx.lineTo(tx+14,ty+5); ctx.stroke();
  }
  // Legs
  const ls = Math.sin(lz.walkFrame)*0.45;
  ctx.strokeStyle = col.dark; ctx.lineWidth = 3;
  ctx.beginPath(); ctx.moveTo(cx+10,cy+10); ctx.lineTo(cx+10+Math.sin(ls)*10,cy+20); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx+10,cy+10); ctx.lineTo(cx+16-Math.sin(ls)*10,cy+20); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx-10,cy+10); ctx.lineTo(cx-10-Math.sin(ls)*10,cy+20); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx-10,cy+10); ctx.lineTo(cx-4+Math.sin(ls)*10,cy+20); ctx.stroke();
  ctx.restore();
}

// ── Ninja Monkey ──────────────────────────────────────────────────────────────
function updateNinjaMonkey() {
  const m = ninjaMonkey;
  if (m.phase === 'entering') {
    m.vy = Math.min(m.vy + 0.3, 8);
    m.y += m.vy;
    if (m.y >= GROUND) {
      m.y = GROUND;
      m.vy = 0;
      m.phase = 'walking';
    }
  } else if (m.phase === 'walking') {
    m.x += m.walkDir * 1.2;
    if (m.x < W - 120) { m.x = W - 120; m.walkDir = 1; }
    if (m.x > W - 20)  { m.x = W - 20;  m.walkDir = -1; }
    m.walkFrame += 0.12;
    m.shotTimer--;
    if (m.shotTimer <= 0 && m.shotsLeft > 0) {
      shootNinjaStar();
      m.shotsLeft--;
      if (m.shotsLeft > 0) {
        m.shotTimer = 180;
      } else {
        m.phase = 'leaving';
        m.vy = -12;
      }
    }
  } else if (m.phase === 'leaving') {
    m.vy += 0.2;
    m.y += m.vy;
    if (m.y < -120) ninjaMonkey = null;
  }
}

function shootNinjaStar() {
  const m = ninjaMonkey;
  // shoot from monkey's hand/chest area
  const ox = m.x, oy = m.y - 30;
  const tx = hero.x + hero.w / 2;
  const ty = hero.y + hero.h / 2;
  const dx = tx - ox, dy = ty - oy;
  const dist = Math.sqrt(dx * dx + dy * dy) || 1;
  const spd = 1.4 + level * 0.28;
  ninjaStars.push({ x: ox, y: oy, vx: (dx / dist) * spd, vy: (dy / dist) * spd, rot: 0 });
}

function updateNinjaStars() {
  ninjaStars.forEach(s => { s.x += s.vx; s.y += s.vy; s.rot += 0.18; });
  ninjaStars = ninjaStars.filter(s => s.x > -30 && s.x < W + 30 && s.y > -30 && s.y < H + 30);
}

function _drawBananaShape(x, y, r, rot) {
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(rot);
  // Tip positions
  const lx = -r * 1.1, ly = r * 0.15;
  const rx =  r * 1.1, ry = r * 0.15;
  // Filled crescent: outer (back) curve + inner (belly) curve meeting at tips
  ctx.fillStyle = '#f5e030';
  ctx.beginPath();
  ctx.moveTo(lx, ly);
  ctx.quadraticCurveTo(0, -r * 1.15, rx, ry); // outer arc
  ctx.quadraticCurveTo(0,  r * 0.6,  lx, ly); // inner arc (belly)
  ctx.closePath();
  ctx.fill();
  // Amber shading strip along the outer edge
  ctx.strokeStyle = '#c89800';
  ctx.lineWidth = r * 0.22;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(lx + r * 0.35, ly - r * 0.3);
  ctx.quadraticCurveTo(0, -r * 0.82, rx - r * 0.35, ry - r * 0.3);
  ctx.stroke();
  // Dark brown tip nubs
  ctx.fillStyle = '#4a2e00';
  ctx.beginPath(); ctx.arc(lx, ly, r * 0.19, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(rx, ry, r * 0.19, 0, Math.PI * 2); ctx.fill();
  ctx.restore();
}

function drawNinjaStar(s) {
  _drawBananaShape(s.x, s.y, 9, s.rot);
}

function drawNinjaMonkey(m) {
  // m.y = feet y in screen space; monkey is ~55px tall
  const bx = m.x;
  const fy = m.y;        // feet
  const by = fy - 24;    // body center
  const hy = fy - 50;    // head center

  ctx.save();
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';

  // Tail (curves up and to the right)
  ctx.beginPath();
  ctx.moveTo(bx + 10, by + 4);
  ctx.bezierCurveTo(bx + 32, by, bx + 38, by - 22, bx + 20, by - 28);
  ctx.strokeStyle = '#7a4a20'; ctx.lineWidth = 5; ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(bx + 10, by + 4);
  ctx.bezierCurveTo(bx + 32, by, bx + 38, by - 22, bx + 20, by - 28);
  ctx.strokeStyle = '#a06030'; ctx.lineWidth = 2.5; ctx.stroke();

  // Body (black ninja gi)
  ctx.beginPath();
  ctx.ellipse(bx, by, 13, 17, 0, 0, Math.PI * 2);
  ctx.fillStyle = '#1a1a1a'; ctx.fill();
  ctx.strokeStyle = '#444'; ctx.lineWidth = 1.5; ctx.stroke();

  // Gi white stripe down center
  ctx.beginPath();
  ctx.moveTo(bx, by - 10); ctx.lineTo(bx, by + 12);
  ctx.strokeStyle = '#e8e8e8'; ctx.lineWidth = 2; ctx.stroke();

  // Legs
  const ls = Math.sin(m.walkFrame) * 0.5;
  ctx.strokeStyle = '#1a1a1a'; ctx.lineWidth = 5;
  ctx.beginPath(); ctx.moveTo(bx - 5, by + 14); ctx.lineTo(bx - 5 + Math.sin(ls) * 9, fy); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(bx + 5, by + 14); ctx.lineTo(bx + 5 - Math.sin(ls) * 9, fy); ctx.stroke();
  // Feet (brown)
  ctx.strokeStyle = '#a06030'; ctx.lineWidth = 3;
  ctx.beginPath(); ctx.moveTo(bx - 5 + Math.sin(ls) * 9, fy); ctx.lineTo(bx - 5 + Math.sin(ls) * 9 - 6, fy + 3); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(bx + 5 - Math.sin(ls) * 9, fy); ctx.lineTo(bx + 5 - Math.sin(ls) * 9 - 6, fy + 3); ctx.stroke();

  // Arm raise when about to throw
  const aboutToShoot = m.phase === 'walking' && m.shotTimer > 0 && m.shotTimer < 60;
  const armRaise = aboutToShoot ? 1.0 : 0;

  // Left arm
  ctx.strokeStyle = '#1a1a1a'; ctx.lineWidth = 4;
  ctx.beginPath();
  ctx.moveTo(bx - 12, by - 4);
  ctx.lineTo(bx - 20, by + 4 + Math.sin(m.walkFrame * 0.5) * 2);
  ctx.stroke();

  // Right arm (throwing arm)
  const raEndY = by - 6 - armRaise * 14;
  ctx.beginPath();
  ctx.moveTo(bx + 12, by - 4);
  ctx.lineTo(bx + 22, raEndY);
  ctx.stroke();

  // Head
  ctx.beginPath();
  ctx.arc(bx, hy, 13, 0, Math.PI * 2);
  ctx.fillStyle = '#8B5E3C'; ctx.fill();
  ctx.strokeStyle = '#5a3a10'; ctx.lineWidth = 1.5; ctx.stroke();

  // Muzzle
  ctx.beginPath();
  ctx.ellipse(bx, hy + 6, 7, 5, 0, 0, Math.PI * 2);
  ctx.fillStyle = '#c49060'; ctx.fill();

  // Ninja mask (black band across eye area)
  ctx.beginPath();
  ctx.roundRect(bx - 13, hy - 7, 26, 9, 3);
  ctx.fillStyle = '#111'; ctx.fill();

  // Eyes (white slits on mask)
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.ellipse(bx - 4, hy - 3, 3, 1.5, 0, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(bx + 4, hy - 3, 3, 1.5, 0, 0, Math.PI * 2); ctx.fill();

  // Headband
  ctx.beginPath();
  ctx.roundRect(bx - 13, hy - 9, 26, 4, 2);
  ctx.fillStyle = '#222'; ctx.fill();
  // Headband tails on right
  ctx.strokeStyle = '#333'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(bx + 12, hy - 8); ctx.lineTo(bx + 18, hy - 4); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(bx + 12, hy - 8); ctx.lineTo(bx + 20, hy - 9); ctx.stroke();

  // Shuriken held in right hand while walking
  if (m.phase === 'walking') {
    _drawShurikenShape(bx + 24, raEndY - 2, 7, (Date.now() * 0.004) % (Math.PI * 2));
  }

  ctx.restore();
}

// ── Star Coins ────────────────────────────────────────────────────────────────
let coins = [], coinSpawnTimer = 0;

function spawnCoin() {
  const onPlat = platforms.length > 0 && Math.random() < 0.35;
  let cx2, cy2;
  if (onPlat) {
    const plat = platforms[Math.floor(Math.random() * platforms.length)];
    if (plat.x > W - 120) { cx2 = plat.x + plat.w/2; cy2 = plat.y - 32; }
    else { cx2 = W+30; cy2 = GROUND-50; }
  } else { cx2 = W+30; cy2 = GROUND-48-Math.random()*40; }
  coins.push({ x: cx2, y: cy2, rot: Math.random()*Math.PI*2, r: 14 });
}

function updateCoins(ws) {
  const ci = Math.max(45, 110 - level*5);
  if (++coinSpawnTimer >= ci) { coinSpawnTimer = 0; spawnCoin(); }
  coins.forEach(c => { c.x -= ws; c.rot += 0.07; });
  coins = coins.filter(c => c.x > -40);
}

function drawStar(x, y, r, rot, color) {
  ctx.save();
  ctx.translate(x, y); ctx.rotate(rot);
  ctx.beginPath();
  for (let i = 0; i < 10; i++) {
    const a = (i * Math.PI) / 5 - Math.PI / 2;
    const rad = i % 2 === 0 ? r : r * 0.45;
    if (i === 0) ctx.moveTo(Math.cos(a)*rad, Math.sin(a)*rad);
    else ctx.lineTo(Math.cos(a)*rad, Math.sin(a)*rad);
  }
  ctx.closePath();
  ctx.fillStyle = color; ctx.fill();
  ctx.strokeStyle = 'rgba(0,0,0,0.25)'; ctx.lineWidth = 1; ctx.stroke();
  ctx.restore();
}

// ── Bonus Room ────────────────────────────────────────────────────────────────
function initBonusCoins() {
  bonusCoins = [];
  // Floor level
  for (let i = 0; i < 13; i++) {
    bonusCoins.push({ x: ROOM_X + 30 + Math.random()*(ROOM_W-60), y: ROOM_FLOOR_Y - 20, rot: Math.random()*Math.PI*2, r: 12 });
  }
  // Mid-air
  for (let i = 0; i < 10; i++) {
    bonusCoins.push({ x: ROOM_X + 20 + Math.random()*(ROOM_W-40), y: ROOM_Y + 40 + Math.random()*(ROOM_H-120), rot: Math.random()*Math.PI*2, r: 12 });
  }
  // On each platform
  BONUS_PLATFORMS.forEach(p => {
    for (let i = 0; i < 3; i++) {
      bonusCoins.push({ x: p.x + 15 + Math.random()*(p.w-30), y: p.y - 22, rot: Math.random()*Math.PI*2, r: 12 });
    }
  });
}

function enterBonus(pipe) {
  bonusCurrentPipe = pipe;
  savedHeroX = hero.x; savedHeroY = hero.y;
  hero.x = ROOM_X + ROOM_W/2 - hero.w/2;
  hero.y = ROOM_Y + 40; // hero drops from the ceiling pipe
  hero.vx = 0; hero.vy = 4; // falling in
  hero.onGround = false;
  hero.walkFrame = 0;
  bonusTimer = 10 * 60;
  bonusEntryFlash = 90; // show "FELL IN!" for 1.5 s
  initBonusCoins();
  bonusParticles = [];
  state = STATE.BONUS;
}

function exitBonus() {
  hero.x = savedHeroX; hero.y = savedHeroY - 10;
  hero.vx = 0; hero.vy = -10;
  hero.onGround = false;
  hero.invincible = 90; hero.flickerToggle = 0;
  const idx = pipes.indexOf(bonusCurrentPipe);
  if (idx !== -1) pipes.splice(idx, 1);
  bonusCurrentPipe = null;
  state = STATE.PLAYING;
}

function drawBonusRoom() {
  // Dimmed world behind
  drawBackground();
  ctx.fillStyle = 'rgba(0,0,0,0.72)';
  ctx.fillRect(0, 0, W, H);

  // Room background - underground cave
  const cave = ctx.createLinearGradient(ROOM_X, ROOM_Y, ROOM_X, ROOM_Y+ROOM_H);
  cave.addColorStop(0, '#1a0e05');
  cave.addColorStop(1, '#2e1a08');
  ctx.fillStyle = cave;
  ctx.fillRect(ROOM_X, ROOM_Y, ROOM_W, ROOM_H);

  // Stone wall texture (vertical lines)
  ctx.strokeStyle = 'rgba(0,0,0,0.25)'; ctx.lineWidth = 1;
  for (let tx = ROOM_X; tx < ROOM_X+ROOM_W; tx += 24) {
    ctx.beginPath(); ctx.moveTo(tx, ROOM_Y); ctx.lineTo(tx, ROOM_Y+ROOM_H); ctx.stroke();
  }
  for (let ty = ROOM_Y; ty < ROOM_Y+ROOM_H; ty += 24) {
    ctx.beginPath(); ctx.moveTo(ROOM_X, ty); ctx.lineTo(ROOM_X+ROOM_W, ty); ctx.stroke();
  }

  // Room border / walls
  ctx.strokeStyle = '#5a3a1a'; ctx.lineWidth = 5;
  ctx.strokeRect(ROOM_X, ROOM_Y, ROOM_W, ROOM_H);
  ctx.strokeStyle = '#8B5E3C'; ctx.lineWidth = 2;
  ctx.strokeRect(ROOM_X+3, ROOM_Y+3, ROOM_W-6, ROOM_H-6);

  // Floor
  ctx.fillStyle = '#4a2e10';
  ctx.fillRect(ROOM_X, ROOM_FLOOR_Y-2, ROOM_W, ROOM_H - (ROOM_FLOOR_Y - ROOM_Y) + 2);
  ctx.fillStyle = '#6a4020';
  ctx.fillRect(ROOM_X, ROOM_FLOOR_Y-2, ROOM_W, 6);

  // Ceiling
  ctx.fillStyle = '#3a2008';
  ctx.fillRect(ROOM_X, ROOM_Y, ROOM_W, 20);

  // Entry pipe stub (shows where hero fell through)
  drawCeilingPipe(ROOM_X + ROOM_W / 2);

  // Bonus platforms (stone look)
  BONUS_PLATFORMS.forEach(p => {
    ctx.fillStyle = '#4a3520';
    ctx.fillRect(p.x, p.y+4, p.w, p.h-4);
    ctx.fillStyle = '#6a5030';
    ctx.fillRect(p.x, p.y, p.w, 8);
    ctx.fillStyle = '#7a6040';
    ctx.fillRect(p.x+3, p.y+1, 14, 3);
  });

  // Ambient torches (glow blobs)
  [[ROOM_X+30, ROOM_Y+30],[ROOM_X+ROOM_W-30, ROOM_Y+30],[ROOM_X+ROOM_W/2, ROOM_Y+30]].forEach(([tx,ty]) => {
    const grd = ctx.createRadialGradient(tx, ty, 2, tx, ty, 50);
    grd.addColorStop(0, 'rgba(255,180,40,0.35)');
    grd.addColorStop(1, 'rgba(255,100,0,0)');
    ctx.fillStyle = grd;
    ctx.beginPath(); ctx.arc(tx, ty, 50, 0, Math.PI*2); ctx.fill();
    // Flame dot
    ctx.fillStyle = '#FFD700';
    ctx.beginPath(); ctx.arc(tx, ty, 4, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(tx, ty, 1.5, 0, Math.PI*2); ctx.fill();
  });

  // Bonus coins
  bonusCoins.forEach(c => drawStar(c.x, c.y, c.r, c.rot, '#FFD700'));

  // Particles
  drawParticleArr(bonusParticles);

  // Hero
  drawHero();

  // Timer bar
  const timerPct = bonusTimer / (15*60);
  const barW = ROOM_W - 20;
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillRect(ROOM_X+10, ROOM_Y-22, barW, 14);
  const barColor = timerPct > 0.4 ? '#4CAF50' : timerPct > 0.2 ? '#FFD700' : '#ff4444';
  ctx.fillStyle = barColor;
  ctx.fillRect(ROOM_X+10, ROOM_Y-22, barW*timerPct, 14);
  ctx.strokeStyle = '#fff'; ctx.lineWidth = 1;
  ctx.strokeRect(ROOM_X+10, ROOM_Y-22, barW, 14);

  ctx.save();
  ctx.textAlign = 'center';
  ctx.font = 'bold 13px Courier New';
  ctx.fillStyle = '#fff';
  const secs = Math.ceil(bonusTimer/60);
  ctx.fillText('BONUS ROOM  ' + secs + 's  —  ★' + bonusCoins.length + ' left', W/2, ROOM_Y-10);

  // "FELL IN!" flash on entry
  if (bonusEntryFlash > 0) {
    const alpha = Math.min(1, bonusEntryFlash / 30);
    ctx.globalAlpha = alpha;
    ctx.font = 'bold 36px Courier New';
    ctx.fillStyle = '#FFD700';
    ctx.shadowColor = '#ff8800'; ctx.shadowBlur = 14;
    ctx.fillText('SECRET ROOM!', W/2, ROOM_Y + ROOM_H/2 - 20);
    ctx.shadowBlur = 0;
    ctx.globalAlpha = 1;
    bonusEntryFlash--;
  }
  ctx.restore();

  // HUD on top
  drawHUD();
}

function updateBonusRoom() {
  updateBonusHero();
  bonusCoins.forEach(c => c.rot += 0.07);
  bonusParticles = updateParticleArr(bonusParticles);

  // Coin collection
  bonusCoins = bonusCoins.filter(c => {
    if (rectsOverlap(hero.x+2, hero.y+2, hero.w-4, hero.h-4, c.x-c.r, c.y-c.r, c.r*2, c.r*2)) {
      score += 10;
      spawnParticles(c.x, c.y, ['#FFD700','#FFF176','#FFEC42'], 8, 2.5, bonusParticles);
      return false;
    }
    return true;
  });

  bonusTimer--;
  if (bonusTimer <= 0) exitBonus();
}

// ── Collision ─────────────────────────────────────────────────────────────────
function rectsOverlap(ax,ay,aw,ah,bx,by,bw,bh) {
  return ax < bx+bw && ax+aw > bx && ay < by+bh && ay+ah > by;
}

function checkCollisions() {
  if (hero.invincible <= 0) {
    lizards.forEach(lz => {
      if (rectsOverlap(hero.x+3, hero.y+5, hero.w-6, hero.h-5, lz.x, lz.y, lz.w, lz.h)) {
        lives--;
        hero.invincible = 120; hero.flickerToggle = 0;
        spawnParticles(hero.x+hero.w/2, hero.y+hero.h/2, ['#ff3300','#ff7700','#ffaa00'], 10, 3.5);
        ninjaMonkey = null; ninjaStars = [];
        state = STATE.DEAD;
        deadTimer = lives <= 0 ? 90 : 60;
      }
    });

    // Ninja star collisions
    for (let i = ninjaStars.length - 1; i >= 0; i--) {
      const s = ninjaStars[i];
      if (rectsOverlap(hero.x+3, hero.y+5, hero.w-6, hero.h-5, s.x-8, s.y-8, 16, 16)) {
        lives--;
        hero.invincible = 120; hero.flickerToggle = 0;
        spawnParticles(hero.x+hero.w/2, hero.y+hero.h/2, ['#ff3300','#555555','#999999'], 10, 3.5);
        ninjaMonkey = null; ninjaStars = [];
        state = STATE.DEAD;
        deadTimer = lives <= 0 ? 90 : 60;
        break;
      }
    }
  }

  coins = coins.filter(c => {
    if (rectsOverlap(hero.x+2, hero.y+2, hero.w-4, hero.h-4, c.x-c.r, c.y-c.r, c.r*2, c.r*2)) {
      score += 10; coinsCollected++;
      spawnParticles(c.x, c.y, ['#FFD700','#FFF176','#FFEC42'], 10, 2.5);
      if (coinsCollected >= coinsForLevel(level)) {
        coinsCollected = 0; level++;
        ninjaMonkeySpawnTimer = 300;
        if ([5, 10, 15, 18, 20, 23, 25, 26, 27, 28, 29, 30].includes(level) && !vineUsedLevels.has(level) && !vine) { vine = { worldX: scrollX + W + 300, w: 14, h: 220, forLevel: level }; }
        if (level > 30) { victory = true; if (score > highScore) { highScore = score; localStorage.setItem('stickLizardsHighScore', highScore); } state = STATE.GAMEOVER; }
      }
      return false;
    }
    return true;
  });
}

// ── HUD ───────────────────────────────────────────────────────────────────────
function coinsForLevel(l) { return 5 + l * 2; }

function drawHUD() {
  ctx.save();
  ctx.font = 'bold 18px Courier New';
  ctx.fillStyle = 'rgba(0,0,0,0.45)';
  ctx.fillRect(6, 6, 162, 28);
  ctx.fillStyle = '#FFD700';
  ctx.fillText('SCORE: ' + score, 14, 26);

  const lvlText = 'LEVEL ' + level + '/30';
  const lw = ctx.measureText(lvlText).width;
  ctx.fillStyle = 'rgba(0,0,0,0.45)';
  ctx.fillRect(W/2-lw/2-8, 6, lw+16, 28);
  ctx.fillStyle = '#fff';
  ctx.fillText(lvlText, W/2-lw/2, 26);

  const pct = Math.min(coinsCollected / coinsForLevel(level), 1);
  ctx.fillStyle = 'rgba(0,0,0,0.45)';
  ctx.fillRect(W/2-lw/2-8, 36, lw+16, 8);
  ctx.fillStyle = '#FFD700';
  ctx.fillRect(W/2-lw/2-8, 36, (lw+16)*pct, 8);

  const hStr = '♥'.repeat(lives) + '♡'.repeat(Math.max(0, 3-lives));
  const hw = ctx.measureText(hStr).width;
  ctx.fillStyle = 'rgba(0,0,0,0.45)';
  ctx.fillRect(W-hw-22, 6, hw+16, 28);
  ctx.fillStyle = '#ff4444';
  ctx.fillText(hStr, W-hw-14, 26);
  ctx.restore();
}

// ── Title / Game Over ─────────────────────────────────────────────────────────
function drawTitle() {
  drawBackground();
  ctx.fillStyle = 'rgba(0,0,30,0.55)';
  ctx.fillRect(0, 0, W, H);
  ctx.save(); ctx.textAlign = 'center';
  ctx.font = 'bold 54px Courier New'; ctx.fillStyle = '#FFD700';
  ctx.shadowColor = '#ff8800'; ctx.shadowBlur = 18;
  ctx.fillText('STICK vs LIZARDS', W/2, 120); ctx.shadowBlur = 0;
  ctx.font = '20px Courier New'; ctx.fillStyle = '#fff';
  ctx.fillText('← → Move     ↑ Jump', W/2, 190);
  ctx.fillText('Collect ★ coins to advance levels', W/2, 220);
  ctx.fillText('Avoid lizards — 3 lives', W/2, 250);
  ctx.fillStyle = '#FFD700';
  ctx.fillText('Hidden trap doors lead to a Secret Bonus Room!', W/2, 282);
  // ── Sword color picker ──
  ctx.font = '17px Courier New'; ctx.fillStyle = '#ffffff';
  ctx.fillText('Sword color:', W/2, 308);
  const swatchR = 13, swatchY = 335, totalW = SWORD_COLORS.length * (swatchR * 2 + 10) - 10;
  const startX = W/2 - totalW/2 + swatchR;
  SWORD_COLORS.forEach((col, i) => {
    const sx = startX + i * (swatchR * 2 + 10);
    // Selection ring
    if (i === swordColorIdx) {
      ctx.beginPath(); ctx.arc(sx, swatchY, swatchR + 4, 0, Math.PI * 2);
      ctx.strokeStyle = '#ffffff'; ctx.lineWidth = 2; ctx.stroke();
    }
    // Swatch circle
    ctx.beginPath(); ctx.arc(sx, swatchY, swatchR, 0, Math.PI * 2);
    ctx.fillStyle = col.blade; ctx.fill();
    ctx.strokeStyle = col.guard; ctx.lineWidth = 2; ctx.stroke();
  });
  // Selected color name + mini sword preview
  const selCol = SWORD_COLORS[swordColorIdx];
  ctx.font = '15px Courier New'; ctx.fillStyle = selCol.blade;
  ctx.fillText(selCol.name, W/2, 364);
  // Arrows hint
  ctx.font = '14px Courier New'; ctx.fillStyle = 'rgba(255,255,255,0.55)';
  ctx.fillText('← → to change', W/2, 382);

  ctx.font = 'bold 20px Courier New'; ctx.fillStyle = '#aaffaa';
  ctx.fillText('Press Enter or Space to start!', W/2, 410);
  if (highScore > 0) {
    ctx.font = '18px Courier New'; ctx.fillStyle = '#aaddff';
    ctx.fillText('HIGH SCORE: ' + highScore, W/2, 438);
  }
  ctx.restore();
}

function drawGameOver() {
  drawBackground();
  ctx.fillStyle = 'rgba(0,0,30,0.65)';
  ctx.fillRect(0, 0, W, H);
  ctx.save(); ctx.textAlign = 'center';
  if (victory) {
    ctx.font = 'bold 48px Courier New'; ctx.fillStyle = '#FFD700';
    ctx.shadowColor = '#ffcc00'; ctx.shadowBlur = 16;
    ctx.fillText('YOU WIN!', W/2, 140); ctx.shadowBlur = 0;
    ctx.font = '24px Courier New'; ctx.fillStyle = '#aaffaa';
    ctx.fillText('30 Levels Complete!', W/2, 188);
  } else {
    ctx.font = 'bold 52px Courier New'; ctx.fillStyle = '#ff4444';
    ctx.shadowColor = '#ff0000'; ctx.shadowBlur = 16;
    ctx.fillText('GAME OVER', W/2, 140); ctx.shadowBlur = 0;
  }
  ctx.font = '26px Courier New'; ctx.fillStyle = '#fff';
  ctx.fillText('Final Score: ' + score, W/2, 238);
  if (highScore > 0) {
    ctx.font = '18px Courier New'; ctx.fillStyle = '#aaddff';
    ctx.fillText('HIGH SCORE: ' + highScore, W/2, 270);
  }
  ctx.font = 'bold 20px Courier New'; ctx.fillStyle = '#aaddff';
  ctx.fillText('Press R to play again', W/2, 315);
  ctx.restore();
}

// ── Start / Reset ─────────────────────────────────────────────────────────────
function startGame() { state = STATE.PLAYING; }

function resetGame() {
  if (score > highScore) { highScore = score; localStorage.setItem('stickLizardsHighScore', highScore); }
  score = 0; level = 1; lives = 3; coinsCollected = 0;
  victory = false; scrollX = 0;
  lizards = []; coins = []; platforms = []; particles = [];
  lizardSpawnTimer = 0; coinSpawnTimer = 0; platformSpawnTimer = 0;
  ninjaMonkey = null; ninjaMonkeyUsedLevel = -1; ninjaMonkeySpawnTimer = 300; ninjaStars = [];
  pipes.length = 0; pipes.push({ worldX: 6000, w: 60 }, { worldX: 13000, w: 60 });
  bonusCurrentPipe = null;
  vine = null; vineUsedLevels.clear();
  cloudWatermelons = []; cloudParticles = [];
  hero.onVine = false;
  hero.x = 150; hero.y = GROUND - 52;
  hero.vx = 0; hero.vy = 0;
  hero.onGround = true;
  hero.invincible = 0; hero.walkFrame = 0;
  downJustPressed = false;
  state = STATE.PLAYING;
}

// ── Main Loop ─────────────────────────────────────────────────────────────────
let lastTime = 0;
function loop(ts) {
  requestAnimationFrame(loop);
  lastTime = ts;

  if (state === STATE.TITLE) {
    scrollX += 0.8;
    drawTitle();
    return;
  }
  if (state === STATE.GAMEOVER) { drawGameOver(); return; }

  if (state === STATE.BONUS) {
    updateBonusRoom();
    drawBonusRoom();
    downJustPressed = false;
    return;
  }

  if (state === STATE.CLOUD) {
    updateCloudRoom();
    drawCloudRoom();
    return;
  }

  if (state === STATE.DEAD) {
    deadTimer--;
    drawBackground(); drawPlatforms();
    lizards.forEach(drawLizard);
    coins.forEach(c => drawStar(c.x, c.y, c.r, c.rot, '#FFD700'));
    particles = updateParticleArr(particles); drawParticleArr(particles);
    drawHero(); drawHUD();
    if (Math.floor(deadTimer/6) % 2 === 0) {
      ctx.save(); ctx.textAlign = 'center';
      ctx.font = 'bold 44px Courier New'; ctx.fillStyle = '#ff4444';
      ctx.shadowColor = '#ff0000'; ctx.shadowBlur = 12;
      ctx.fillText(lives <= 0 ? 'YOU DIED' : 'OUCH!', W/2, H/2-20);
      ctx.restore();
    }
    if (deadTimer <= 0) {
      if (lives <= 0) { if (score > highScore) { highScore = score; localStorage.setItem('stickLizardsHighScore', highScore); } state = STATE.GAMEOVER; }
      else {
        hero.x = 150; hero.y = GROUND-52;
        hero.vx = 0; hero.vy = 0; hero.onGround = true;
        hero.invincible = 150; hero.flickerToggle = 0;
        state = STATE.PLAYING;
      }
    }
    return;
  }

  // ── PLAYING ──────────────────────────────────────────────────────────────
  const ws = 1.8 + level * 0.06;
  scrollX += ws;

  updateHero();
  downJustPressed = false;

  updatePlatforms(ws);
  updateLizards(ws);
  updateCoins(ws);

  // Ninja monkey spawn (once per level, starting level 10)
  if (level >= 10 && ninjaMonkeyUsedLevel !== level && ninjaMonkey === null) {
    ninjaMonkeySpawnTimer--;
    if (ninjaMonkeySpawnTimer <= 0) {
      ninjaMonkey = { x: W - 60, y: -80, vy: 0, phase: 'entering', walkDir: -1, walkFrame: 0, shotTimer: 180, shotsLeft: 4 };
      ninjaMonkeyUsedLevel = level;
    }
  }
  if (ninjaMonkey) updateNinjaMonkey();
  updateNinjaStars();

  particles = updateParticleArr(particles);

  if (state === STATE.PLAYING) checkCollisions();

  drawBackground();
  drawPlatforms();
  drawVine();
  lizards.forEach(drawLizard);
  ninjaStars.forEach(drawNinjaStar);
  if (ninjaMonkey) drawNinjaMonkey(ninjaMonkey);
  coins.forEach(c => drawStar(c.x, c.y, c.r, c.rot, '#FFD700'));
  drawParticleArr(particles);
  drawHero();
  drawHUD();
}

requestAnimationFrame(loop);
</script>
